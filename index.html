<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Trading Monitor — Hamza</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#0a0c0f; color:#d0d8e4; font-family:'Courier New',monospace; overflow:hidden; }

.header {
  background:#13161b; border-bottom:1px solid #222830;
  padding:10px 20px; display:flex; align-items:center; gap:16px;
  height:46px;
}
.logo { color:#00d4aa; font-weight:bold; font-size:14px; letter-spacing:2px; }
.status { display:flex; align-items:center; gap:6px; font-size:11px; }
.dot { width:8px; height:8px; border-radius:50%; background:#00e676; animation:pulse 1.5s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
.spacer { flex:1; }
.time { font-size:11px; color:#5a6478; }
.countdown {
  font-size:11px; color:#ffa502;
  padding:3px 10px; border:1px solid #ffa502;
  border-radius:4px;
}

.main { display:flex; height:calc(100vh - 46px); }

/* SOL — CHART */
.chart-panel {
  flex:1;
  display:flex; align-items:center; justify-content:center;
  padding:10px;
  border-right:1px solid #222830;
  overflow:hidden;
}
.chart-panel img {
  max-width:100%; max-height:100%;
  border-radius:6px; border:1px solid #222830;
  object-fit:contain;
}
.loading { text-align:center; color:#5a6478; }
.loading .icon { font-size:48px; margin-bottom:16px; }

/* SAĞ — ANALİZ */
.analysis-panel {
  width:320px; min-width:280px;
  background:#0d0f13;
  display:flex; flex-direction:column;
  overflow:hidden;
}
.analysis-header {
  padding:12px 16px; border-bottom:1px solid #222830;
  display:flex; align-items:center; justify-content:space-between;
}
.analysis-title { font-size:11px; letter-spacing:2px; color:#00d4aa; font-weight:bold; }
.analysis-time { font-size:10px; color:#2a3040; }

.analysis-body { flex:1; overflow-y:auto; padding:14px; }
.analysis-body::-webkit-scrollbar { width:4px; }
.analysis-body::-webkit-scrollbar-thumb { background:#222830; border-radius:2px; }

.bias-block { text-align:center; padding:14px; border-radius:6px; margin-bottom:12px; border:1px solid transparent; }
.bias-block.bearish { background:rgba(255,71,87,0.08); border-color:rgba(255,71,87,0.25); }
.bias-block.bullish { background:rgba(0,230,118,0.08); border-color:rgba(0,230,118,0.25); }
.bias-block.neutral { background:rgba(255,165,2,0.08); border-color:rgba(255,165,2,0.25); }
.bias-label { font-size:10px; letter-spacing:2px; color:#5a6478; margin-bottom:6px; }
.bias-value { font-size:22px; font-weight:bold; letter-spacing:1px; }
.bias-block.bearish .bias-value { color:#ff4757; }
.bias-block.bullish .bias-value { color:#00e676; }
.bias-block.neutral .bias-value { color:#ffa502; }

.card { background:#13161b; border:1px solid #222830; border-radius:6px; padding:12px; margin-bottom:12px; }
.card-title { font-size:10px; letter-spacing:2px; color:#5a6478; margin-bottom:10px; }
.row { display:flex; justify-content:space-between; align-items:center; padding:4px 0; border-bottom:1px solid #1a1e26; font-size:12px; }
.row:last-child { border-bottom:none; }
.row-key { color:#5a6478; }
.row-val { font-weight:bold; }
.vah { color:#ff4757; } .vpoc { color:#ffa502; } .val { color:#00e676; }
.neg { color:#ff4757; } .pos { color:#00e676; }

.should-block { border-radius:6px; padding:12px; margin-bottom:12px; border:1px solid transparent; }
.should-block.yes { background:rgba(0,230,118,0.06); border-color:rgba(0,230,118,0.2); }
.should-block.no  { background:rgba(255,71,87,0.06);  border-color:rgba(255,71,87,0.2); }
.should-block.wait{ background:rgba(255,165,2,0.06);  border-color:rgba(255,165,2,0.2); }
.should-label { font-size:10px; letter-spacing:2px; color:#5a6478; margin-bottom:6px; }
.should-value { font-size:14px; font-weight:bold; }
.should-block.yes .should-value { color:#00e676; }
.should-block.no  .should-value { color:#ff4757; }
.should-block.wait .should-value { color:#ffa502; }
.should-reason { font-size:11px; color:#5a6478; margin-top:6px; line-height:1.5; }

.notes-text { font-size:11px; color:#8090a8; line-height:1.7; }

.empty-analysis { display:flex; flex-direction:column; align-items:center; justify-content:center; height:100%; text-align:center; color:#2a3040; gap:10px; }
.empty-analysis .icon { font-size:36px; }
.empty-analysis p { font-size:12px; line-height:1.6; }

.timestamp { position:fixed; bottom:8px; left:10px; font-size:10px; color:#2a3040; background:rgba(10,12,15,0.8); padding:3px 8px; border-radius:4px; }

@media(max-width:700px) {
  body { overflow:auto; }
  .main { flex-direction:column; height:auto; }
  .chart-panel { height:60vw; border-right:none; border-bottom:1px solid #222830; }
  .analysis-panel { width:100%; }
}
</style>
</head>
<body>

<div class="header">
  <div class="logo">▸ FLOW MONITOR</div>
  <div class="status">
    <div class="dot" id="statusDot"></div>
    <span id="statusText">Bağlanıyor...</span>
  </div>
  <div class="spacer"></div>
  <div class="time" id="currentTime">--:--:--</div>
  <div class="countdown" id="countdown">⟳ 30s</div>
</div>

<div class="main">
  <div class="chart-panel">
    <div class="loading" id="loading">
      <div class="icon">📊</div>
      <p style="font-size:14px">Ekran bekleniyor...</p>
      <p style="margin-top:8px;font-size:12px;color:#2a3040">trading_upload.py çalışıyor olmalı</p>
    </div>
    <img id="chartImg" style="display:none" alt="ATAS Chart">
  </div>

  <div class="analysis-panel">
    <div class="analysis-header">
      <div class="analysis-title">CLAUDE ANALİZİ</div>
      <div class="analysis-time" id="analysisTime">—</div>
    </div>
    <div class="analysis-body" id="analysisBody">
      <div class="empty-analysis">
        <div class="icon">🤖</div>
        <p>Analiz bekleniyor...<br><br>analysis.json<br>push edilince görünür</p>
      </div>
    </div>
  </div>
</div>

<div class="timestamp" id="lastUpdate">Son güncelleme: —</div>

<script>
const IMG_URL      = 'https://raw.githubusercontent.com/hamzagul917-dotcom/trading-live/main/live.jpg';
const ANALYSIS_URL = 'https://raw.githubusercontent.com/hamzagul917-dotcom/trading-live/main/analysis.json';

let imgCd = 30, analysisCd = 60;

setInterval(() => {
  document.getElementById('currentTime').textContent = new Date().toLocaleTimeString('tr-TR');
}, 1000);

setInterval(() => {
  imgCd--;
  if (imgCd <= 0) { imgCd = 30; loadChart(); }
  document.getElementById('countdown').textContent = `⟳ ${imgCd}s`;
  analysisCd--;
  if (analysisCd <= 0) { analysisCd = 60; loadAnalysis(); }
}, 1000);

function loadChart() {
  const img = document.getElementById('chartImg');
  const url = IMG_URL + '?t=' + Date.now();
  const t = new Image();
  t.onload = () => {
    img.src = url;
    img.style.display = 'block';
    document.getElementById('loading').style.display = 'none';
    document.getElementById('statusText').textContent = 'Canlı';
    document.getElementById('statusDot').style.background = '#00e676';
    document.getElementById('lastUpdate').textContent = 'Son güncelleme: ' + new Date().toLocaleTimeString('tr-TR');
  };
  t.onerror = () => {
    document.getElementById('statusText').textContent = 'Bekleniyor...';
    document.getElementById('statusDot').style.background = '#ffa502';
  };
  t.src = url;
}

async function loadAnalysis() {
  try {
    const res = await fetch(ANALYSIS_URL + '?t=' + Date.now());
    if (!res.ok) return;
    renderAnalysis(await res.json());
  } catch(e) {}
}

function renderAnalysis(d) {
  const biasClass = d.bias === 'BEARISH' ? 'bearish' : d.bias === 'BULLISH' ? 'bullish' : 'neutral';
  const biasArrow = d.bias === 'BEARISH' ? '↓ BEARISH' : d.bias === 'BULLISH' ? '↑ BULLISH' : '→ NEUTRAL';
  const shouldClass = d.should_trade === 'EVET' ? 'yes' : d.should_trade === 'HAYIR' ? 'no' : 'wait';
  const deltaClass = (d.delta?.session || '').startsWith('-') ? 'neg' : 'pos';
  const cvdClass = d.delta?.cvd === 'NEGATİF' ? 'neg' : 'pos';

  document.getElementById('analysisTime').textContent = d.timestamp || '—';
  document.getElementById('analysisBody').innerHTML = `
    <div class="bias-block ${biasClass}">
      <div class="bias-label">GENEL BIAS</div>
      <div class="bias-value">${biasArrow}</div>
    </div>

    <div class="card">
      <div class="card-title">KRİTİK SEVİYELER</div>
      <div class="row"><span class="row-key">VAH</span><span class="row-val vah">${d.levels?.vah||'—'}</span></div>
      <div class="row"><span class="row-key">vPOC</span><span class="row-val vpoc">${d.levels?.vpoc||'—'}</span></div>
      <div class="row"><span class="row-key">VAL</span><span class="row-val val">${d.levels?.val||'—'}</span></div>
    </div>

    <div class="card">
      <div class="card-title">DELTA & CVD</div>
      <div class="row"><span class="row-key">Session Delta</span><span class="row-val ${deltaClass}">${d.delta?.session||'—'}</span></div>
      <div class="row"><span class="row-key">CVD</span><span class="row-val ${cvdClass}">${d.delta?.cvd||'—'}</span></div>
      <div class="row"><span class="row-key">Absorpsiyon</span><span class="row-val">${d.delta?.absorption||'—'}</span></div>
    </div>

    <div class="should-block ${shouldClass}">
      <div class="should-label">SHOULD TRADE?</div>
      <div class="should-value">${d.should_trade||'—'}</div>
      <div class="should-reason">${d.should_reason||''}</div>
    </div>

    <div class="card">
      <div class="card-title">ANALİZ</div>
      <div class="notes-text">${d.notes||'—'}</div>
    </div>

    <div class="card">
      <div class="card-title">HEDEF</div>
      <div class="row"><span class="row-key">Giriş</span><span class="row-val">${d.targets?.entry||'—'}</span></div>
      <div class="row"><span class="row-key">TP1</span><span class="row-val">${d.targets?.tp1||'—'}</span></div>
      <div class="row"><span class="row-key">TP2</span><span class="row-val">${d.targets?.tp2||'—'}</span></div>
      <div class="row"><span class="row-key">Stop</span><span class="row-val">${d.targets?.stop||'—'}</span></div>
    </div>
  `;
}

loadChart();
loadAnalysis();
</script>
</body>
</html>
